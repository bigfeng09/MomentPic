name: Publish backend-v2 to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag. Defaults to UTC yyyyMMdd-HHmmss."
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/bigfeng09/momentpic-backend-v2
  IMAGE_ALIAS: ghcr.io/bigfeng09/moment-pic-v2

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            image_tag="${{ inputs.image_tag }}"
          else
            image_tag="$(date -u +'%Y%m%d-%H%M%S')"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:${image_tag}"
            echo "${IMAGE_ALIAS}:latest"
            echo "${IMAGE_ALIAS}:${image_tag}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend-v2
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend-v2
          file: ./backend-v2/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "### GHCR publish"
            echo "- Image: ${IMAGE_NAME}"
            echo "- Alias: ${IMAGE_ALIAS}"
            echo "- Tags: latest, ${{ steps.tags.outputs.image_tag }}"
            echo "- Digest: ${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
