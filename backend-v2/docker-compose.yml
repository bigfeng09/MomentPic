services:
  moment-pic-v2:
    build:
      context: .
    image: moment-pic-v2:${MOMENTPIC_IMAGE_TAG:-20260608-local}
    container_name: moment-pic-v2
    restart: unless-stopped
    network_mode: bridge
    env_file:
      - path: /example/appdata/moment-pic-v2/.env
        required: false
    ports:
      - "3211:3211"
    environment:
      HOST: "0.0.0.0"
      PORT: "3211"
      MOMENTPIC_DB_PATH: "/app/data/momentpic-v2.sqlite"
      MOMENTPIC_SEED_DEMO: "false"
      MOMENTPIC_PATH_PREFIX_MAP: '[{"from":"/example/media/moment/","to":"/example/media/moment/download/"}]'
      MOMENTPIC_THUMBNAIL_CACHE_DIR: "/app/data/thumbnails"
    volumes:
      - /example/appdata/moment-pic-v2/data:/app/data
      - /example/media/moment:/example/media/moment:ro
