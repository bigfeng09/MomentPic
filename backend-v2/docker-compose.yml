services:
  moment-pic-v2:
    build:
      context: .
    image: moment-pic-v2:${MOMENTPIC_IMAGE_TAG:-20260608-local}
    container_name: moment-pic-v2
    restart: unless-stopped
    network_mode: bridge
    env_file:
      - path: /mnt/user/appdata/moment-pic-v2/.env
        required: false
    ports:
      - "3211:3211"
    environment:
      HOST: "0.0.0.0"
      PORT: "3211"
      MOMENTPIC_DB_PATH: "/app/data/momentpic-v2.sqlite"
      MOMENTPIC_SEED_DEMO: "false"
      MOMENTPIC_PATH_PREFIX_MAP: '[{"from":"/mnt/user/media/download/moment/","to":"/mnt/user/media/download/moment/download/"}]'
      MOMENTPIC_LIBRARY_ALLOWED_ROOTS: "/mnt/user/media/download/moment,/mnt/user/media/download"
      MOMENTPIC_THUMBNAIL_CACHE_DIR: "/app/data/thumbnails"
    volumes:
      - /mnt/user/appdata/moment-pic-v2/data:/app/data
      - /mnt/user/media/download/moment:/mnt/user/media/download/moment:ro
